window:
  title: "Conductino Study Browser"
  width: 1280
  height: 720
  debug: true # Set to true to right-click -> Inspect Element inside your app

ipc:
  frontend_listen: "127.0.0.1:8080" # Where Go hosts your UI and handles JS fetch calls
  backend_url: "http://127.0.0.1:8081" # Where your Zig backend microservice will listen

storage:
  database_path: "./data/study_vault.db"

archive:
  output_dir: "./data/downloads"
  max_bytes: 104857600 # 100MB max file size limit for downloading archives